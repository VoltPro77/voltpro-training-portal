{% extends "base.html" %}
{% block title %}Change Password — VoltPro Training{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 style="font-size: 1.3rem;">Change Password</h1>
    <form method="post">
      <label>Current password
        <input type="password" name="current_password" autocomplete="current-password" required autofocus>
      </label>
      <label>New password
        <input type="password" name="new_password" autocomplete="new-password" minlength="6" required>
      </label>
      <label>Confirm new password
        <input type="password" name="confirm_password" autocomplete="new-password" minlength="6" required>
      </label>
      <button class="btn-pill btn-block" type="submit">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
