{% extends "base.html" %}
{% block title %}Log in — VoltPro Training{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <img class="auth-logo" src="{{ url_for('static', filename='images/voltpro-logo.jpg') }}" alt="VoltPro">
    <p class="auth-subtitle">STAFF TRAINING PORTAL</p>
    <form method="post">
      <label>Username
        <input type="text" name="username" autocomplete="username" required autofocus>
      </label>
      <label>Password
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="btn-pill btn-block" type="submit">Log in</button>
    </form>
  </div>
</div>
{% endblock %}
